name: Deploy React to sangietapande.com

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ftp.sangietapande.com
          username: ${{ secrets.S_FTP_USERNAME }}
          password: ${{ secrets.S_FTP_PASSWORD }}
          local-dir: dist/
          remote-dir: public_html/
